name: CI

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch: {}

jobs:
  build:
    name: Build (${{ matrix.os }}, .NET ${{ matrix.dotnet }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-latest ]
        dotnet: [ '8.0.x', '9.0.x', '10.0.x' ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        run: dotnet restore src/SIPSorceryMedia.SoundFlow.csproj

      - name: Build
        run: dotnet build src/SIPSorceryMedia.SoundFlow.csproj -c Release --no-restore -p:TreatWarningsAsErrors=true

  pack:
    name: Pack
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/SIPSorceryMedia.SoundFlow.csproj

      - name: Pack
        run: dotnet pack src/SIPSorceryMedia.SoundFlow.csproj -c Release --no-restore -o ./nupkgs

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: nupkgs/

  publish:
    name: Publish to NuGet.org
    needs: pack
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC trusted publishing
    steps:
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nupkgs
          path: nupkgs/

      # Requires a Trusted Publishing policy configured on nuget.org:
      #   Owner: cinderblocks  Repository: SIPSorceryMedia.SoundFlow
      #   Workflow: ci.yml  Environment: (none)
      - name: Get NuGet publish token
        id: nuget-token
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('api.nuget.org');
            core.setSecret(token);
            core.setOutput('token', token);

      - name: Push to NuGet.org
        env:
          NUGET_TOKEN: ${{ steps.nuget-token.outputs.token }}
        run: |
          dotnet nuget push "nupkgs/*.nupkg" \
            --api-key "$NUGET_TOKEN" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push "nupkgs/*.snupkg" \
            --api-key "$NUGET_TOKEN" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
