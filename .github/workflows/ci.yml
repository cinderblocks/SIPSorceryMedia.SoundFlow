name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build
        run: dotnet build src/SIPSorceryMedia.SoundFlow.csproj -c Release -p:TreatWarningsAsErrors=true

      - name: Pack
        run: dotnet pack src/SIPSorceryMedia.SoundFlow.csproj -c Release --no-build -p:TreatWarningsAsErrors=true -o ./nupkgs

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: nupkgs/

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for OIDC trusted publishing to nuget.org
      packages: write  # required for GitHub Packages push
    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nupkgs
          path: nupkgs/

      # Requires a Trusted Publishing policy on nuget.org:
      #   Owner: cinderblocks  Repository: SIPSorceryMedia.SoundFlow  Workflow: ci.yml
      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: |
          dotnet nuget push "nupkgs/*.nupkg" \
            --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push "nupkgs/*.snupkg" \
            --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push "nupkgs/*.nupkg" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --skip-duplicate
